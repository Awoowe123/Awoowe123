<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 40" width="100%" height="100%">
  <defs>
    <!-- Symmetrical typewriter clipping masks that expand from left to right (X=0) to full width (500) -->
    <clipPath id="clip1">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" values="0;500;500;0;0" keyTimes="0;0.09375;0.2125;0.2375;1" dur="16s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <clipPath id="clip2">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.25;0.34375;0.4625;0.4875;1" dur="16s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <clipPath id="clip3">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.50;0.59375;0.7125;0.7375;1" dur="16s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <clipPath id="clip4">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.75;0.84375;0.9625;0.9875;1" dur="16s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <style>
    .tech-text {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 19px;
      font-weight: 600;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <!-- Line 1: AI-Augmented Engineer (Red) -->
  <text x="250" y="20" class="tech-text" fill="#ff3333" clip-path="url(#clip1)">
    AI-Augmented Engineer
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.2125;0.2375;1" dur="16s" repeatCount="indefinite" />
  </text>

  <!-- Line 2: Проектирую распределенные системы (White) -->
  <text x="250" y="20" class="tech-text" fill="#ffffff" clip-path="url(#clip2)">
    Проектирую распределенные системы
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.249;0.25;0.4625;0.4875;1" dur="16s" repeatCount="indefinite" />
  </text>

  <!-- Line 3: Python · TypeScript · Go (Red) -->
  <text x="250" y="20" class="tech-text" fill="#ff3333" clip-path="url(#clip3)">
    Python · TypeScript · Go
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.499;0.50;0.7125;0.7375;1" dur="16s" repeatCount="indefinite" />
  </text>

  <!-- Line 4: Krasnoyarsk, Russia (White) -->
  <text x="250" y="20" class="tech-text" fill="#ffffff" clip-path="url(#clip4)">
    Krasnoyarsk, Russia
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.749;0.75;0.9625;0.9875;1" dur="16s" repeatCount="indefinite" />
  </text>
</svg>
